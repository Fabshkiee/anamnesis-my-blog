<script>
  
  const theme = (() => {
    if (typeof localStorage !== 'undefined' && localStorage.getItem('theme')) {
      return localStorage.getItem('theme');
    }
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      return 'dark';
    }
    return 'light';
  })();
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>

    .progress-ring .progress-circle {
      stroke: var(--muted-foreground);
      stroke-dasharray: 40.8407;  
      stroke-dashoffset: 40.8407;
      transition: stroke-dashoffset 0.1s;
    }

    toc-current {
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--muted-foreground); font-size: 0.875rem;
    }

    .chevron {
      width: 1em; height: 1em; flex-shrink: 0; color: var(--muted-foreground);
      transition: transform 0.2s;
    }

    .erudite-toc:has(input:checked) .chevron {
      transform: rotate(180deg);
    }

    .toc-menu {
      display: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
      padding-inline: var(--grid-gutter);
      background-color: color-mix(in oklab, var(--background) 90%, transparent);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .erudite-toc:has(input:checked) .toc-menu {
      display: block;
    }
  }

   
  @media (min-width: 64rem) {
    .erudite-toc {
      position: sticky;
      top: var(--page-offset-top);
    }
    .toc-title-desktop { display: block; }
  }

   
  #TableOfContents ul {
    list-style: none; padding-left: 0; margin: 0;
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  #TableOfContents > ul { padding-left: 0; }
  #TableOfContents ul ul { padding-left: 1rem; margin-top: 0.5rem; border-left: 1px solid var(--border); margin-left: 0.25rem; }
  #TableOfContents a { color: var(--muted-foreground); text-decoration: none; }
  #TableOfContents a:hover, #TableOfContents a.active { color: var(--foreground); }
</style>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const defaultTitle = "";
    const tocCurrent = document.querySelector('toc-current');
    const progressCircle = document.querySelector('.progress-circle');
    const links = document.querySelectorAll('#TableOfContents a');
    
    
    const sections = Array.from(links).map(link => {
      const href = link.getAttribute('href');
      if (href && href.startsWith('#')) {
        return document.getElementById(href.substring(1));
      }
      return null;
    }).filter(Boolean);

    function onScroll() {
      
      if (progressCircle) {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const scrollPercent = docHeight > 0 ? scrollTop / docHeight : 0;
        const circumference = 40.8407;
        progressCircle.style.strokeDashoffset = String(circumference - (scrollPercent * circumference));
      }

      
      let currentSection = null;
      sections.forEach(section => {
        const rect = section.getBoundingClientRect();
        
        if (rect.top <= window.innerHeight / 3) {
          currentSection = section;
        }
      });

      links.forEach(link => link.classList.remove('active'));

      if (currentSection) {
        const id = currentSection.getAttribute('id');
        const activeLink = document.querySelector(`#TableOfContents a[href="#${id}"]`);
        if (activeLink) {
          activeLink.classList.add('active');
          if (tocCurrent) tocCurrent.textContent = activeLink.textContent;
        }
      } else {
        if (tocCurrent) tocCurrent.textContent = defaultTitle;
      }
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll(); 
  });
</script>
